name = "paigeswaincom"
main = "worker/worker.js"
compatibility_date = "2026-03-01"
workers_dev = false
preview_urls = false

[[routes]]
pattern = "paigeswain.com/*"
zone_name = "paigeswain.com"

[[routes]]
pattern = "www.paigeswain.com/*"
zone_name = "paigeswain.com"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]
